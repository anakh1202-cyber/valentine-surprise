<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine Surprise</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:#ffe6f0; text-align:center; overflow-x:hidden; }

  .screen { display:none; flex-direction:column; justify-content:center; align-items:center; width:100%; height:100vh; position:relative; }
  .active { display:flex; }

  button { padding:10px 20px; margin:10px; font-size:1rem; cursor:pointer; border:none; border-radius:8px; background:#ff6699; color:#fff; transition: transform 0.3s; }
  button:hover { transform: scale(1.1); }

  /* Envelope */
  #envelope { width:150px; height:100px; background:#ffb6c1; position:relative; cursor:pointer; margin-top:20px; border-radius:8px; }
  #envelope::before { content:''; position:absolute; top:0; left:0; width:0; height:0; border-left:75px solid transparent; border-right:75px solid transparent; border-bottom:50px solid #ff69b4; }
  #envelope.open::before { transform: rotateX(180deg); transition: transform 1s; }

  /* Letter (photo + message) */
  .letter { transform: translateY(100%); opacity:0; transition: transform 3s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 2s ease-out; max-width:90%; margin-top:20px; }
  .letter.open { transform: translateY(0); opacity:1; }

  /* Hearts animation */
  .heart { position:absolute; font-size:1.5rem; color:#ff3366; animation: floatUp 4s linear infinite; }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(-500px) rotate(360deg); opacity:0; }
  }
</style>
</head>
<body>

<!-- Background Music -->
<audio id="bgMusic">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Screen 1: Introduction -->
<div id="screen1" class="screen active">
  <h1>Open this… 😊</h1>
  <p>I have a question for you.</p>
  <button id="continueBtn">Continue</button>
</div>

<!-- Screen 2: Tricky Valentine Question -->
<div id="screen2" class="screen">
  <h2>Do you really love me? Will you be my Valentine forever?</h2>
  <p>If you’re curious, click No.</p>
  <button id="yesBtn">Yes</button>
  <button id="noBtn">No</button>
</div>

<!-- Screen 3: Envelope / Letter -->
<div id="screen3" class="screen">
  <div id="envelope"></div>
  <div id="letter" class="letter">
    <img src="image.png.jpg" alt="My Valentine" style="max-width:90%; border-radius:8px; margin-bottom:10px;">
    <p>To my favourite person 💖<br>
       I just wanted to make you smile today.<br>
       You are really special to me.<br>
       – Paru</p>
  </div>
</div>

<script>
  // Screen transitions
  const screen1 = document.getElementById("screen1");
  const screen2 = document.getElementById("screen2");
  const screen3 = document.getElementById("screen3");
  const continueBtn = document.getElementById("continueBtn");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const envelope = document.getElementById("envelope");
  const letter = document.getElementById("letter");
  const bgMusic = document.getElementById("bgMusic");

  continueBtn.onclick = () => { screen1.classList.remove("active"); screen2.classList.add("active"); }

  // Trick effect for No button
  noBtn.onclick = () => {
    if(noBtn.innerText === "No") noBtn.innerText = "Maybe";
    else if(noBtn.innerText === "Maybe") noBtn.innerText = "Try Again";
    else noBtn.innerText = "No";
  }

  yesBtn.onclick = () => { screen2.classList.remove("active"); screen3.classList.add("active"); spawnHearts(); }

  // Envelope click → reveal letter + music
  function openLetter(){
    envelope.classList.toggle("open");
    bgMusic.play();
    letter.classList.add("open"); // smooth bottom-to-top reveal
  }
  envelope.onclick = openLetter;

  // Hearts animation
  function spawnHearts(){
    for(let i=0;i<10;i++){
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random()*90 + "%";
      heart.style.fontSize = (Math.random()*1.5+1) + "rem";
      screen3.appendChild(heart);
      setTimeout(()=>{ heart.remove(); },4000);
    }
  }
</script>

</body>
</html>
